# =============================================================================
# ioDesk Integration - Docker Compose for Hermes Agent
# =============================================================================
# Use this file to run Hermes alongside ioDesk-3 and LocalAGI-ionet.
#
# Prerequisites:
#   - **ioDesk-3 must be running first** (creates the `iodesk-internal` Docker network)
#   - LocalAGI-ionet containers running (optional)
#
# Deploy ordering:
#   1. ioDesk-3: `docker compose up -d`  (creates network + MCP server + web)
#   2. Hermes:    `docker compose -f docker-compose.integration.yml up -d`
#   3. LocalAGI:  `docker compose -f docker-compose.prod.yaml up -d` (optional)
#
# Usage:
#   HERMES_UID=$(id -u) HERMES_GID=$(id -g) docker compose \
#     -f docker-compose.integration.yml up -d
#
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # Gateway - Messaging + AI agent loop
  # ---------------------------------------------------------------------------
  gateway:
    image: ghcr.io/iodevs-net/hermes-agent:latest
    container_name: hermes
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ~/.hermes:/opt/data
    environment:
      - HERMES_UID=${HERMES_UID:-10000}
      - HERMES_GID=${HERMES_GID:-10000}
      # ioDesk MCP server URL (auto-configures MCP client on start)
      - HERMES_IODESK_MCP_URL=${HERMES_IODESK_MCP_URL:-http://iodesk-mcp:8765/mcp}
      # ioDesk MCP auth token (set in ioDesk .env as IODESK_MCP_TOKEN)
      - HERMES_IODESK_MCP_TOKEN=${HERMES_IODESK_MCP_TOKEN:-}
    command: ["gateway", "run"]
    networks:
      - iodesk-internal

  # ---------------------------------------------------------------------------
  # Dashboard - Web UI (port 9119)
  # ---------------------------------------------------------------------------
  dashboard:
    image: ghcr.io/iodevs-net/hermes-agent:latest
    container_name: hermes-dashboard
    restart: unless-stopped
    depends_on:
      - gateway
    volumes:
      - ~/.hermes:/opt/data
    environment:
      - HERMES_UID=${HERMES_UID:-10000}
      - HERMES_GID=${HERMES_GID:-10000}
    ports:
      - "9119:9119"
    # --insecure: allow bind to 0.0.0.0 (safe behind Docker port mapping + NAT).
    # For internet-facing: use SSH tunnel or reverse proxy with auth instead.
    command: ["dashboard", "--host", "0.0.0.0", "--port", "9119", "--insecure"]
    networks:
      - iodesk-internal

networks:
  iodesk-internal:
    name: iodesk-internal
    external: true
