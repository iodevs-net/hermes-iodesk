logging:
  backup_count: 3
  level: INFO
  max_size_mb: 5
mattermost:
  channel_prompts: {}
mcp_servers:
  iodesk:
    enabled: true
    url: http://iodesk-mcp:8765/mcp
memory:
  memory_char_limit: 2200
  memory_enabled: true
  provider: ''
  user_char_limit: 1375
  user_profile_enabled: true
model:
  base_url: https://openrouter.ai/api/v1
  default: nvidia/nemotron-3-super-120b-a12b:free
  provider: openrouter
network:
  force_ipv4: false
onboarding:
