    enabled: true
    provider_filter: []
    refresh_interval: 3600
  guardrail:
    guardrail_identifier: ''
    guardrail_version: ''
    stream_processing_mode: async
    trace: disabled
  region: ''
browser:
  allow_private_urls: false
  camofox:
    managed_persistence: false
  cdp_url: ''
  command_timeout: 30
  inactivity_timeout: 120
  record_sessions: false
checkpoints:
  enabled: true
  max_snapshots: 50
code_execution:
  mode: project
command_allowlist: []
compression:
  enabled: true
  protect_last_n: 20
  target_ratio: 0.2
  threshold: 0.5
context:
  engine: compressor
credential_pool_strategies: {}
cron:
  max_parallel_jobs: null
  wrap_response: true
dashboard:
  theme: cyberpunk
delegation:
  api_key: ''
  base_url: ''
  max_concurrent_children: 3
  max_iterations: 50
  max_spawn_depth: 1
  model: ''
  orchestrator_enabled: true
  provider: ''
  reasoning_effort: ''
discord:
  allowed_channels: ''
  auto_thread: true
  channel_prompts: {}
  free_response_channels: ''
  reactions: true
  require_mention: true
  server_actions: ''
display:
  bell_on_complete: false
  busy_input_mode: interrupt
  compact: false
  final_response_markdown: strip
  inline_diffs: true
  interim_assistant_messages: true
  personality: kawaii
  platforms:
    api_server:
      port: 8643
  resume_display: full
  show_cost: false
  show_reasoning: false
  skin: default
  streaming: false
  tool_preview_length: 0
  tool_progress_command: false
  tool_progress_overrides: {}
  user_message_preview:
    first_lines: 2
    last_lines: 2
fallback_providers: []
file_read_max_chars: 100000
honcho: {}
hooks: {}
hooks_auto_accept: false
human_delay:
  max_ms: 2500
  min_ms: 800
