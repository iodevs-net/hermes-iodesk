name: Build, Push and Deploy

on:
  push:
    branches: [main, develop]
    paths:
      - '**/*.py'
      - 'pyproject.toml'
      - 'uv.lock'
      - 'Dockerfile'
      - 'docker/**'
      - 'docker-compose.integration.yml'
      - '.github/workflows/deploy-iodesk.yml'

permissions:
  contents: read
  packages: write

concurrency:
  group: ghcr-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    if: github.repository == 'iodevs-net/hermes-iodesk'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          submodules: recursive

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f  # v3

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9  # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8  # v6
        with:
          context: .
          file: Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            # ghcr.io/iodevs-net/hermes-agent:${{ github.ref_name }}
            ghcr.io/iodevs-net/hermes-agent:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    if: github.repository == 'iodevs-net/hermes-iodesk' && github.ref_name == 'main'
    needs: build-and-push
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: deploy-ci
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e
            cd /root/hermes-iodesk
            git config --global --add safe.directory /root/hermes-iodesk
            git pull origin main
            docker pull ghcr.io/iodevs-net/hermes-agent:latest
            docker compose -f docker-compose.integration.yml up -d --force-recreate gateway dashboard
            docker image prune -f
